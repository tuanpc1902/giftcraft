# GiftCraft Studio — local development stack
# Usage (from repo root):
#   docker compose -f infra/docker-compose.yml up -d

name: giftcraft

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - nextjs
      - laravel
    networks:
      - giftcraft_net

  nextjs:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_PUBLIC_API_URL: http://localhost/api
      NEXT_PUBLIC_SITE_URL: http://localhost
      WATCHPACK_POLLING: "true"
    networks:
      - giftcraft_net

  laravel:
    build:
      context: ../backend
      dockerfile: Dockerfile
    volumes:
      - ../backend:/var/www/html
    env_file:
      - ../.env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - giftcraft_net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: giftcraft_db
      POSTGRES_USER: giftcraft
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432" # host 5433 to avoid clash with other local stacks
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U giftcraft -d giftcraft_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - giftcraft_net

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379" # host 6380 to avoid clash with other local stacks
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - giftcraft_net

  meilisearch:
    image: getmeili/meilisearch:v1.8
    environment:
      MEILI_MASTER_KEY: local_master_key
      MEILI_ENV: development
    ports:
      - "7701:7700" # host 7701 to avoid clash with other local stacks
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - giftcraft_net

networks:
  giftcraft_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
