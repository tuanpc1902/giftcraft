# GiftCraft Studio — production stack
# Deploy: ./infra/scripts/deploy.sh

name: giftcraft

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - nextjs
      - laravel
    restart: unless-stopped
    networks:
      - giftcraft_net

  nextjs:
    build:
      context: ../frontend
      dockerfile: Dockerfile.prod
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    restart: unless-stopped
    networks:
      - giftcraft_net

  laravel:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: php artisan serve --host=0.0.0.0 --port=8000
    volumes:
      - storage_data:/var/www/html/storage
    env_file:
      - ../.env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - giftcraft_net

  horizon:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: php artisan horizon
    volumes:
      - storage_data:/var/www/html/storage
    env_file:
      - ../.env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - giftcraft_net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - giftcraft_net

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - giftcraft_net

  meilisearch:
    image: getmeili/meilisearch:v1.8
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY}
      MEILI_ENV: production
    volumes:
      - meilisearch_data:/meili_data
    restart: unless-stopped
    networks:
      - giftcraft_net

networks:
  giftcraft_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  storage_data:
  certbot_www:
