# GiftCraft Studio — production NGINX (HTTPS + security + rate limiting)

# Rate limit zones
limit_req_zone $binary_remote_addr zone=auth_limit:10m    rate=5r/m;
limit_req_zone $binary_remote_addr zone=checkout_limit:10m rate=3r/m;
limit_req_zone $binary_remote_addr zone=b2b_limit:10m     rate=5r/m;
limit_req_zone $binary_remote_addr zone=chat_limit:10m    rate=10r/m;
limit_req_zone $binary_remote_addr zone=general_api:10m   rate=60r/m;

# --- HTTP: redirect to HTTPS ---
server {
    listen 80;
    server_name giftcraft.vn www.giftcraft.vn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS ---
server {
    listen 443 ssl;
    http2 on;
    server_name giftcraft.vn www.giftcraft.vn;

    ssl_certificate     /etc/letsencrypt/live/giftcraft.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/giftcraft.vn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 50M;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;

    # ── Security headers ───────────────────────────────────────────────────────
    add_header X-Frame-Options              "DENY" always;
    add_header X-Content-Type-Options       "nosniff" always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security    "max-age=63072000; includeSubDomains; preload" always;
    add_header X-XSS-Protection             "1; mode=block" always;
    add_header Permissions-Policy           "camera=(), microphone=(), geolocation=(), payment=(self)" always;
    add_header Cross-Origin-Opener-Policy   "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;
    # CSP: allow self + fonts + images from R2/placehold; block framing via frame-ancestors
    add_header Content-Security-Policy      "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://*.r2.cloudflarestorage.com https://placehold.co; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    # ──────────────────────────────────────────────────────────────────────────

    # Horizon — block all public access (allow VPN/bastion IPs in production)
    location /horizon {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://laravel:8000/horizon;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Auth endpoints — tightest rate limit
    location /api/auth/ {
        limit_req zone=auth_limit burst=3 nodelay;
        proxy_pass http://laravel:8000/api/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Checkout — rate limited
    location /api/orders/checkout {
        limit_req zone=checkout_limit burst=2 nodelay;
        proxy_pass http://laravel:8000/api/orders/checkout;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # B2B quotes — rate limited
    location /api/b2b/ {
        limit_req zone=b2b_limit burst=3 nodelay;
        proxy_pass http://laravel:8000/api/b2b/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # AI Chat — SSE streaming, rate limited
    location /api/chat {
        limit_req zone=chat_limit burst=5 nodelay;
        proxy_pass http://laravel:8000/api/chat;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE: disable buffering so tokens stream through immediately
        proxy_read_timeout    120s;
        proxy_buffering       off;
        proxy_cache           off;
        proxy_set_header      Connection '';
        chunked_transfer_encoding on;
    }

    # All other API endpoints
    location /api/ {
        limit_req zone=general_api burst=20 nodelay;
        proxy_pass http://laravel:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Next.js frontend (static assets get long cache)
    location /_next/static/ {
        proxy_pass http://nextjs:3000/_next/static/;
        proxy_set_header Host $host;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://nextjs:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
