<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GiftCraft Studio — Quà tặng cao cấp</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 14px); } to { opacity: 1; transform: translate(-50%, 0); } }
  @keyframes viewIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  .gc-view { animation: none; }

  .gc-ico { background: none; border: 0; padding: 4px; color: var(--ink); display: inline-flex; transition: color .2s, transform .2s; }
  .gc-ico:hover { color: var(--accent); }

  .gc-link::after { content: ""; position: absolute; left: 0; right: 100%; bottom: -2px; height: 1px; background: var(--accent); transition: right .3s var(--ease); }
  .gc-link:hover::after { right: 0; }
  .gc-link:hover { color: var(--accent); }

  .gc-foot-link { cursor: pointer; transition: color .2s; }
  .gc-foot-link:hover { color: #fff !important; }

  /* hover-add toggle */
  [data-hoveradd="0"] .gc-hoveradd { display: none !important; }

  /* ---------- Responsive ---------- */
  @media (max-width: 1100px) {
    :root { --gutter: 28px; }
    .gc-navlinks { display: none !important; }
  }
  @media (max-width: 980px) {
    .gc-detail { grid-template-columns: 1fr !important; gap: 36px !important; }
    .gc-gallery { position: static !important; }
    .gc-b2b { grid-template-columns: 1fr !important; gap: 36px !important; }
    .gc-listgrid { grid-template-columns: 1fr !important; }
    .gc-filter { display: none !important; }
    .gc-hero-copy { padding: 60px 0 !important; }
    .gc-grid4 { grid-template-columns: repeat(2, 1fr) !important; }
    .gc-ig { grid-template-columns: repeat(3,1fr) !important; }
  }
  @media (max-width: 820px) {
    .section { padding: 72px 0 !important; }
    .section-sm { padding: 60px 0 !important; }
    .gc-2col { grid-template-columns: 1fr !important; }
    .gc-grid3 { grid-template-columns: repeat(2,1fr) !important; }
    .gc-footgrid { grid-template-columns: 1fr 1fr !important; gap: 36px !important; }
    section [style*="grid-template-columns: 1fr 1fr"] { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 560px) {
    :root { --gutter: 18px; }
    .gc-hide-sm { display: none !important; }
    .gc-grid4, .gc-grid3 { grid-template-columns: repeat(2,1fr) !important; gap: 16px !important; }
    .gc-ig { grid-template-columns: repeat(2,1fr) !important; }
    .gc-footgrid { grid-template-columns: 1fr !important; }
  }
</style>
</head>
<body>
<template id="__bundler_thumbnail">

    <rect x="30" y="42" width="40" height="9" fill="#8f1414"/>
    <rect x="47" y="30" width="6" height="42" fill="#fee2e2"/>
    <rect x="30" y="49" width="40" height="3" fill="#fff" opacity="0.7"/>
    <circle cx="50" cy="30" r="6" fill="none" stroke="#b91c1c" stroke-width="3"/>
  </svg>
</template>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
